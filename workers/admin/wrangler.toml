name = "rofsansir-admin"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "rofsansir-assets"

[env.production]
routes = [
  { pattern = "admin.rofsansir.com", custom_domain = true }
]
vars = { ADMIN_USERNAME = "admin" }

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "rofsansir-assets"
