<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#344871"/>

  <!-- Left 60% - Welcoming graphic -->
  <rect width="720" height="630" fill="#006DD6" opacity="0.15"/>

  <!-- Classroom/people icons -->
  <circle cx="150" cy="200" r="60" fill="#006DD6" opacity="0.3"/>
  <circle cx="300" cy="250" r="50" fill="#1877F2" opacity="0.3"/>
  <circle cx="450" cy="200" r="55" fill="#006DD6" opacity="0.3"/>
  <circle cx="200" cy="400" r="45" fill="#1877F2" opacity="0.3"/>
  <circle cx="380" cy="380" r="50" fill="#006DD6" opacity="0.3"/>

  <!-- Connection lines -->
  <line x1="150" y1="200" x2="300" y2="250" stroke="#006DD6" stroke-width="3" opacity="0.4"/>
  <line x1="300" y1="250" x2="450" y2="200" stroke="#006DD6" stroke-width="3" opacity="0.4"/>
  <line x1="200" y1="400" x2="380" y2="380" stroke="#006DD6" stroke-width="3" opacity="0.4"/>

  <!-- Right 40% -->
  <rect x="720" width="480" height="630" fill="#344871"/>

  <!-- Right side content -->
  <text x="760" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Join O Level Bengali</text>

  <text x="760" y="220" font-family="Arial, sans-serif" font-size="32" fill="#E2E8F0">Classes in Dhaka</text>

  <!-- WhatsApp section -->
  <rect x="760" y="280" width="300" height="100" rx="15" fill="#006DD6"/>
  <text x="780" y="330" font-family="Arial, sans-serif" font-size="20" fill="white">WhatsApp:</text>
  <text x="780" y="365" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">+8801948116595</text>

  <!-- CTA -->
  <rect x="760" y="480" width="200" height="50" rx="25" fill="white" opacity="0.1"/>
  <text x="800" y="515" font-family="Arial, sans-serif" font-size="22" fill="white">Enroll Today →</text>

  <!-- Phone icon -->
  <path d="M 960 320 L 1000 320 L 1000 360 L 960 360 Z" stroke="#1877F2" stroke-width="3" fill="white" opacity="0.2"/>
</svg>