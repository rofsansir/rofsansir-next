  <text x="800" y="415" font-family="Arial, sans-serif" font-size="22" fill="white">CAIE Examiner</text>

  <!-- CTA -->
  <rect x="760" y="500" width="280" height="60" rx="30" fill="white" opacity="0.1"/>
  <text x="800" y="540" font-family="Arial, sans-serif" font-size="24" fill="white">Book Your Free Class →</text>

  <!-- Logo placeholder -->
  <circle cx="250" cy="100" r="60" fill="white" opacity="0.15"/>
  <text x="250" y="115" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">RS</text>
</svg>