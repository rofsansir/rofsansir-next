  <!-- Graduation cap icon -->
  <rect x="150" y="200" width="200" height="150" fill="#006DD6" opacity="0.3" rx="10"/>
  <polygon points="200,200 350,150 500,200 350,250" fill="#1877F2" opacity="0.3"/>

  <!-- Book icon -->
  <rect x="150" y="400" width="120" height="100" fill="#006DD6" opacity="0.3" rx="5"/>
  <rect x="300" y="420" width="120" height="100" fill="#1877F2" opacity="0.3" rx="5"/>

  <!-- Right 40% -->
  <rect x="720" width="480" height="630" fill="#344871"/>

  <!-- Right side content -->
  <text x="760" y="120" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">Expert O Level Bengali</text>

  <text x="760" y="220" font-family="Arial, sans-serif" font-size="32" fill="#E2E8F0">Tutor in Dhaka</text>

  <text x="760" y="320" font-family="Arial, sans-serif" font-size="36" fill="#006DD6">Rofsan Sir</text>

